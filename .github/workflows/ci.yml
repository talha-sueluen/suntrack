name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests python-dotenv streamlit pandas plotly pytest

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Run flake8
        run: |
          pip install flake8
          flake8 backend/ frontend/ --max-line-length=88